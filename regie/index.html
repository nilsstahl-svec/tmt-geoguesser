<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TMT GeoGuessr Regie</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fjalla+One&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../style.css"></head><body><main><section class="card"><div class="topline"><div><div class="kicker">Live-Auswertung</div><h1>TMT GeoGuessr</h1><p class="meta">Regieansicht, aktualisiert automatisch</p></div><div class="badge">LIVE</div></div><div id="leaderboard"></div><div class="grid" id="results"></div></section></main><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { firebaseConfig } from "../firebase-config.js";import { QUESTIONS } from "../questions.js";const app=initializeApp(firebaseConfig);const db=getFirestore(app);const blocks=[{id:"rot",label:"Rot",theme:"theme-rot"},{id:"blau",label:"Blau",theme:"theme-blau"},{id:"gruen",label:"Grün",theme:"theme-gruen"}];const results=document.getElementById("results");const leaderboard=document.getElementById("leaderboard");const q=query(collection(db,"answers"),where("eventId","==","tmt-geoguessr-test"));onSnapshot(q,(snapshot)=>{const data=[];snapshot.forEach(doc=>data.push(doc.data()));renderLeaderboard(data);render(data)},(error)=>{console.error(error);results.innerHTML=`<div class="result-card">Fehler beim Laden. Prüfe Firebase-Regeln und Konfiguration.</div>`});
function statsForBlock(data,blockId){const answers=data.filter(item=>item.blockId===blockId);return{total:answers.length,correct:answers.filter(item=>item.correct).length}}
function renderLeaderboard(data){const stats=blocks.map(block=>({...block,...statsForBlock(data,block.id)}));const maxCorrect=Math.max(0,...stats.map(item=>item.correct));const leaders=stats.filter(item=>item.correct===maxCorrect&&maxCorrect>0).map(item=>item.label);const title=leaders.length===0?"Noch kein führender Block":leaders.length===1?`Aktuell führt Block ${leaders[0]}`:`Aktuell Gleichstand: ${leaders.join(" & ")}`;leaderboard.innerHTML=`<div class="leaderboard-card"><div class="leader-title">${title}</div><div class="leader-sub">Gewertet nach Anzahl richtiger Antworten insgesamt</div><div class="leader-grid">${stats.map(item=>`<div class="leader-item ${item.correct===maxCorrect&&maxCorrect>0?'leading':''} ${item.theme}"><div class="leader-name">Block ${item.label}</div><div class="leader-score">${item.correct}</div><div class="leader-detail">${item.correct} richtig bei ${item.total} Antworten</div></div>`).join("")}</div></div>`}
function render(data){results.innerHTML="";QUESTIONS.forEach((question,index)=>{const card=document.createElement("div");card.className="result-card";const title=document.createElement("h2");title.textContent=`${index+1}. ${question.title}`;card.appendChild(title);blocks.forEach(block=>{const answers=data.filter(item=>item.questionId===question.id&&item.blockId===block.id);const total=answers.length;const correct=answers.filter(item=>item.correct).length;const percent=total===0?0:Math.round((correct/total)*100);const line=document.createElement("div");line.className=`result-line ${block.theme}`;line.innerHTML=`<div class="result-block">${block.label}</div><div><div class="bar"><span style="width:${percent}%"></span></div><div class="small">${correct} von ${total} richtig</div></div><div class="percent">${percent}%</div>`;card.appendChild(line)});results.appendChild(card)})}
</script></body></html>
