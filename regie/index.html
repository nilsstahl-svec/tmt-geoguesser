<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMT GeoGuessr Ergebnisse</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fjalla+One&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body class="results-body">
<main class="results-stage">
<section class="card results-card">
  <div class="topline">
    <div>
      <div class="kicker">Live-Ergebnisse</div>
      <h1 id="pageTitle">TMT GeoGuessr</h1>
      <p class="meta" id="pageMeta">aktualisiert automatisch</p>
    </div>
    <div class="badge" id="liveBadge">LIVE</div>
  </div>
  <div id="content"></div>
  <div class="result-nav">
    <button class="secondary" id="prevBtn">Zurück</button>
    <div class="slide-indicator" id="slideIndicator">Übersicht</div>
    <button id="nextBtn">Weiter</button>
  </div>
</section>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { firebaseConfig } from "../firebase-config.js";
import { QUESTIONS } from "../questions.js";
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
const blocks=[{id:"rot",label:"Rot",theme:"theme-rot"},{id:"blau",label:"Blau",theme:"theme-blau"},{id:"gruen",label:"Grün",theme:"theme-gruen"}];
const content=document.getElementById("content"),pageTitle=document.getElementById("pageTitle"),pageMeta=document.getElementById("pageMeta"),slideIndicator=document.getElementById("slideIndicator"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn");
let slide=0;let latestData=[];
const q=query(collection(db,"answers"),where("eventId","==","tmt-geoguessr-test"));
onSnapshot(q,(snapshot)=>{latestData=[];snapshot.forEach(doc=>latestData.push(doc.data()));render();},(error)=>{console.error(error);content.innerHTML=`<div class="leader-sub">Fehler beim Laden. Prüfe Firebase-Regeln und Konfiguration.</div>`});
function blockStats(data,blockId){const answers=data.filter(item=>item.blockId===blockId);return{total:answers.length,correct:answers.filter(item=>item.correct).length}}
function renderLeaderboard(){const stats=blocks.map(block=>({...block,...blockStats(latestData,block.id)}));const maxCorrect=Math.max(0,...stats.map(item=>item.correct));const leaders=stats.filter(item=>item.correct===maxCorrect&&maxCorrect>0).map(item=>item.label);const title=leaders.length===0?"Noch keine Antworten":leaders.length===1?`Block ${leaders[0]} führt`:`Gleichstand: ${leaders.join(" & ")}`;
pageTitle.textContent="Ergebnisse";pageMeta.textContent="Gesamtstand über alle Fragen";slideIndicator.textContent=`Übersicht · ${latestData.length} Antworten`;
content.innerHTML=`<div class="leader-title">${title}</div><div class="leader-sub">Gewertet wird die Anzahl richtiger Antworten insgesamt.</div><div class="leader-grid">${stats.map(item=>`<div class="leader-item ${item.theme} ${item.correct===maxCorrect&&maxCorrect>0?'leading':''}"><div class="leader-name">Block ${item.label}</div><div class="leader-score">${item.correct}</div><div class="leader-detail">${item.correct} richtig bei ${item.total} Antworten</div>${item.correct===maxCorrect&&maxCorrect>0?'<div class="leader-crown">Aktuell vorne</div>':''}</div>`).join("")}</div>`;
}
function renderQuestionSlide(questionIndex){const question=QUESTIONS[questionIndex];pageTitle.textContent=`Frage ${questionIndex+1}`;pageMeta.textContent=question.title;slideIndicator.textContent=`Frage ${questionIndex+1} / ${QUESTIONS.length}`;
const totalQuestionAnswers=latestData.filter(item=>item.questionId===question.id).length;
content.innerHTML=`<h2 class="single-question-title">${question.title}</h2><div class="question-result-grid">${blocks.map(block=>{const answers=latestData.filter(item=>item.questionId===question.id&&item.blockId===block.id);const total=answers.length;const correct=answers.filter(item=>item.correct).length;const percent=total===0?0:Math.round((correct/total)*100);return `<div class="question-result-row ${block.theme}"><div class="result-block">Block ${block.label}</div><div><div class="bar"><span style="width:${percent}%"></span></div><div class="small">${correct} von ${total} richtig</div></div><div class="percent">${percent}%</div></div>`}).join("")}</div><div class="answer-count">Antworten für diese Frage insgesamt: ${totalQuestionAnswers}</div>`;
}
function render(){prevBtn.disabled=slide===0;nextBtn.disabled=slide===QUESTIONS.length;nextBtn.textContent=slide===QUESTIONS.length?"Ende":"Weiter";if(slide===0){renderLeaderboard()}else{renderQuestionSlide(slide-1)}}
prevBtn.onclick=()=>{if(slide>0){slide--;render()}};nextBtn.onclick=()=>{if(slide<QUESTIONS.length){slide++;render()}};
document.addEventListener("keydown",(event)=>{if(event.key==="ArrowRight"&&slide<QUESTIONS.length){slide++;render()}if(event.key==="ArrowLeft"&&slide>0){slide--;render()}});
render();
</script>
</body></html>
